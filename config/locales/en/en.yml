    credit_check:
      index:
        title: Credit Check Authorization
        leading: Authorize Levitas to request a credit check for the borrower by accepting
          the terms below. This check helps assess the borrower's creditworthiness,
          aiding in the lending decision. Ensure you have obtained necessary consents
          from the borrower as required.
        terms_of_service: |-
          <div class="max-w-2xl mx-auto p-8">
            <h1 class="text-2xl font-bold mb-6 text-center">Levitas Check Authorization Credit Terms of Service</h1>
            <section>
                <h2 class="text-lg font-bold mb-4">1. Introduction</h2>
                <p>Welcome to Levitas's Check Authorization Credit Terms of Service. This document outlines the terms and conditions governing the use of our check authorization services. By using our services, you agree to comply with and be bound by the following terms. Please read them carefully.</p>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4">2. Definitions</h2>
                <ul class="list-disc pl-6">
                  <li><strong>User:</strong> Any individual or entity utilizing Levitas's check authorization services.</li>
                  <li><strong>Service:</strong> Levitas's check authorization service that allows users to authorize and process checks.</li>
                  <li><strong>Merchant:</strong> A business entity accepting checks as a form of payment.</li>
                  <li><strong>Bank:</strong> The financial institution involved in processing and verifying checks.</li>
                </ul>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4">3. Use of Service</h2>
                <p class="mb-2">3.1. By using our check authorization service, you warrant that you are authorized to accept checks on behalf of your business and that you will abide by all applicable laws and regulations.</p>
                <p>3.2. You agree to provide accurate and up-to-date information when using the service. Levitas is not responsible for any losses resulting from inaccurate or incomplete information provided.</p>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4">4. Authorization Process</h2>
                <p class="mb-2">4.1. The service enables merchants to electronically authorize and verify checks presented for payment.</p>
                <p>4.2. The authorization process is subject to verification by the user's bank and is contingent on available funds in the payer's account.</p>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4">5. Fees and Charges</h2>
                <p class="mb-2">5.1. Levitas may charge fees for using the check authorization service. These fees will be clearly communicated to the user.</p>
                <p>5.2. Any additional charges imposed by banks or financial institutions involved in the authorization process are the responsibility of the user.</p>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4">6. Security and Data Protection</h2>
                <p class="mb-2">6.1. Levitas employs industry-standard security measures to protect user information. However, Levitas is not liable for any unauthorized access or breaches.</p>
                <p>6.2. Users are responsible for safeguarding their login credentials and should notify Levitas immediately of any unauthorized use.</p>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4">7. Limitation of Liability</h2>
                <p class="mb-2">7.1. Levitas is not liable for any indirect, consequential, or punitive damages arising from the use of the check authorization service.</p>
                <p>7.2. Levitas is not responsible for any losses resulting from errors or delays in the authorization process.</p>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4">8. Termination</h2>
                <p>8.1. Levitas reserves the right to terminate or suspend access to the check authorization service at any time, with or without cause.</p>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4">9. Governing Law</h2>
                <p>9.1. This agreement shall be governed by the laws of [Jurisdiction], without regard to its conflict of law principles.</p>
            </section>
            <section>
                <h2 class="text-lg font-bold mb-4">10. Amendments</h2>
                <p>10.1. Levitas may update or modify these terms of service at any time. Users will be notified of such changes, and continued use of the service constitutes acceptance of the updated terms.</p>
            </section>
          </div>
        accept_terms: I accept the terms and authorize Levitas to request a credit check
