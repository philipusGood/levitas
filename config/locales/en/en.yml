          deal_terms_policy:
            html: |
              <p class="text-xl font-bold"><a id="_eqbc57vjw2ew"></a>Terms of Service</p>
              <p>The use of this Site for any purpose is subject to these Terms of Use for the Website (the <strong>“Terms”</strong>). The Terms and the Privacy Policy (the <strong>”Privacy Policy”</strong>) constitute a binding legal agreement between you, and Levitas Marketplace Inc. (“<strong>LEVITAS</strong>”), its subsidiaries and affiliated companies (collectively, the <strong>”Levitas Entities”</strong>), governing your access to and use of the Site and use of the services as these terms are defined herein. Access to and use of the Site is conditional on your acceptance of and compliance with the Terms and the Privacy Policy. Please read the Terms and the Privacy Policy carefully before browsing or using this Site or becoming a “User”, “Lender” or “Broker” as these terms are defined herein. By using this Site, you unconditionally agree to follow and be bound by the Terms and the Privacy Policy. Where you are acting on behalf of any other party, you hereby confirm that you have the authority to, and hereby, bind such other party to the Terms and the Privacy Policy. All references to “you” and “your” herein include references to each and every party that you are acting on behalf of, except where the context otherwise requires.</p>
              <p><strong>IF YOU DO NOT ACCEPT THESE TERMS AND THE PRIVACY POLICY, YOU SHOULD NOT USE THIS SITE.</strong></p>
              <p>The contents of the Site include, without limitation, all information, data, products, materials, services, software Loan Requests and tools, design elements, text, images, photographs, illustrations, audio and video contents, artwork and graphics contained therein or otherwise made available to you in connection therewith (collectively the <strong>“Contents”</strong>) and, unless the context clearly requires otherwise, or explicitly stated in writing, the Site includes all the Contents.</p>
              <p>You are encouraged to frequently review the Terms and the Privacy Policy.</p>
              <p>If you have not reached the age of majority in your province or territory of residence, you must refrain from using the Site. You are solely responsible for ensuring that you are legally accessing the Site, and that the Contents available therein or thereby is legal in every jurisdiction where you access or view the Site or the Contents, as well as in any intermediary jurisdiction by which you do so.</p>
              <p><strong>Use of the Site</strong></p>
              <p>You may not reproduce information or materials posted on the Site in any form or download, republish, display, publicly perform, distribute, sell, transfer, modify or use any such information or materials for any public or commercial purpose. Any unauthorized use of any such information or materials may violate copyright laws, trademark laws, laws of privacy and other laws and regulations. The portions of Site and the Contents that can be downloaded are protected by copyright laws, trademark laws and other laws and can only be used in accordance with the Terms or with prior written consent of the owner of such material.</p>
              <p>You cannot use the Site for any purpose that is illegal, unlawful or that is prohibited by the Terms. You may use or access the Site only to review general information made available to you and/or to sign in or log in to the private mortgage lending platform (<strong>“Levitas Lending Platform”</strong>), operated by LEVITAS. Use of the Site for any other purpose, including for commercial purposes, is expressly prohibited. Accessing the Site using third party Loan Requests, other than a browser is prohibited. All rights reserved.</p>
              <p><strong>THE FRAMING, MIRRORING, SCRAPING OR DATA-MINING OF THE SITE OR ANY OF ITS CONTENTS IN ANY FORM AND BY ANY METHOD IS STRICTLY PROHIBITED.</strong></p>
              <p><strong>Protection of Personal Information</strong></p>
              <p>You confirm that you have read the Privacy Policy and agree that it is reasonable. You agree that Levitas Entities may use your personal information, in accordance with these Terms and Privacy Policy and for the stated purposes contained therein.</p>
              <p><strong>User Communications</strong></p>
              <p>Other than personal information subject to the Privacy Policy, all communications or information, as well as all material, suggestions, ideas, concepts, know-how, techniques, questions, comments, or other communications from or to you, made in any manner, to Levitas Entities, their respective officers, directors, employees, consultants, representatives, agents, successors and assigns (the <strong>“Communications”</strong>) are and will be considered non-confidential and non-proprietary. You grant to Levitas Entities a perpetual, royalty-free, irrevocable, transferable, unrestricted, sub-licensable right to use the Communications, for any purpose whatsoever, including without limitation, reproduction, transmission, disclosure, publication, broadcast, display, development, adaptation, translation, creation of derivative works or marketing, in any manner whatsoever, for any or all commercial or non-commercial purpose, without restriction and without any compensation. You represent and warrant that you have the right to distribute and reproduce the Communications and the right to grant the licence granted above. You hereby waive all moral rights in the Communications.</p>
              <p>Levitas Entities may, but are not obligated to, monitor, edit, remove or review any Communications, including questions and answers on the Q &amp; A forum section (<strong>“Q &amp; A content”</strong>) of the Brokers’ mortgage request pages (each a <strong>”Mortgage Request Page”</strong>), and is under no obligation, unless and then only to the extent prescribed by law, to use, return, review or respond to any Communications. Q &amp; A content is a direct communication between Brokers and Lenders, should not be considered as statements of any of the Levitas Entities.</p>
              <p>LEVITAS ENTITIES SHALL HAVE NO LIABILITY RELATED TO THE CONTENT OF ANY COMMUNICATIONS, WHETHER OR NOT ARISING UNDER THE LAWS OF COPYRIGHT, DEFAMATION OR LIBEL, PRIVACY, OBSCENITY OR OTHERWISE.  Levitas Entities reserve the right to remove any or all Communications that contain material deemed inappropriate or unacceptable. Levitas Entities, their respective officers, directors, employees, consultants, representatives, agents, successors and assigns take no responsibility and assume no liability for the Communications.</p>
              <p>LEVITAS will deliver documents to you by either emailing them to the email address you have provided or by posting the documents on your account and will be deemed to be delivered to you, whether or not you elect to open or view the documents. Account statements, transaction confirmations, and other documents (“<strong>My Documents</strong>”) relating to the activities and status of your account will be posted to your account and by using the Site you hereby acknowledge that it is your obligation to monitor your account to view “My Documents” on a regular basis (at least monthly). There is no requirement that you consent to electronic delivery of documents. We may, in our discretion, send a notice to the email address you have provided that a document has been posted to your account. It is your responsibility to ensure the email address remains operational and you will immediately inform us of any changes to your email address. Every transaction confirmation, account statement or other communication delivered by us to you shall be deemed to have been acknowledged as correct, approved and consented to by you unless we shall have received written notice to the contrary within fifteen days after it was delivered to you. You may request a paper copy of any documents delivered electronically for a fee by contacting us. We reserve the right to charge you for preparation and delivery of documents by means other than electronic. You are responsible for all costs expenses incurred by you in accessing the Site.</p>
              <p><strong>Username and Password</strong></p>
              <p>The sections of the Site granting you access to Levitas Lending Platform require you to have a username and a password (<strong>“Credentials”</strong>) which you must request. Should you decide to register on the Site as a broker (a <strong>“Broker”</strong>) and/ or a lender (a <strong>”Lender”</strong>) (with a Broker or Lender being generally referred to, where applicable, as a “<strong>User</strong>”), you agree to provide accurate and up-to-date information about yourself and/or any party on whose behalf you are acting during the registration process (the <strong>”User Registration”</strong>) and to promptly update this information, including but not limited to email addresses, as necessary to ensure it is accurate and complete at all times. Your Credentials will not change, if and when, you become a Lender and/or a Broker.</p>
              <p>Levitas Entities reserve the right to cancel or suspend your Credentials and to suspend, cancel or terminate your account, your use and/or your access to the Site, or any services, as well as remove and delete any information or content related to this Site or one of the services (and terminate your use thereof), for any reason whatsoever and at any time at their sole discretion, without notice and without liability to you in accordance with the Terms.</p>
              <p>Levitas Entities are under no obligation to verify the actual identity or authority of any party using the Credentials to access or use the Site. Any Levitas Entity may, at its sole discretion and at any time, require proof of identity of any party seeking access to and use of the Site and may deny such access, in whole or in part, if the Levitas Entity is not satisfied.</p>
              <p>You are fully responsible and liable for the confidentiality and security of your Credentials as well as for any activity resulting from the use of your Credentials, including any and all use or misuse of the Credentials which may result from your disclosure of the Credentials. <strong>You assume sole responsibility for any activity resulting from the use of your Credentials by anyone including, but not limited to, any of your principals, partners, employees, representatives or agents or any other person who may have obtained the Credentials by any means.</strong> After accessing the Site using the Credentials, you are responsible for closing the browser, clearing the browser’s cache and/or closing the session so that the Credentials cannot be accessed by a subsequent user. If you suspect that the Credentials are lost, stolen and/or known to be used by an authorized party, you shall immediately notify LEVITAS. Levitas Entities assume no responsibility or liability, and cannot be held liable, for any damages arising from or related to your failure to keep your Credentials confidential and secure.</p>
              <p>Should you experience dissatisfaction with the Site or one of its services, Terms and/or Privacy Policy, you may discontinue using the Site or the service in accordance with the Terms.</p>
              <p><strong>Services</strong></p>
              <p><strong>Although parties from all jurisdictions may complete the User Registration to access the Site where permitted by law, the Site is directed only to parties residing or having their principal place of business in one of the provinces or territories of Canada. As such, only parties residing or having their principal place of residence in one of the provinces or territories of Canada may be eligible to become a Broker or a Lender. The Site is not directed to any party in any jurisdiction where, due to that party's residence, principal place of business or otherwise, the publication or availability of the Site is prohibited. Parties in respect of whom such prohibitions apply must not access the Site and may not become a User.</strong></p>
              <p>Levitas Entities make no representations or warranties regarding the completeness, accuracy or currency of any information of the Site. Levitas Entities shall not be liable for any omission, error, inaccuracy or failure to update such information.</p>
              <p><strong>Legal Disclaimer</strong></p>
              <p><strong>UNDER NO CIRCUMSTANCES SHOULD ANY INFORMATION ON THIS SITE BE CONSTRUED AS A PUBLIC OFFERING OF SECURITIES OF LEVITAS MARKETPLACE INC. IN ANY JURISDICTION OF CANADA OR OUTSIDE CANADA. THE CONTENTS ARE PROVIDED SOLELY FOR INFORMATION PURPOSES AND SHOULD NOT BE INTERPRETED AS A RECOMMENDATION OR AS GENERAL OR SPECIFIC FINANCIAL, LEGAL, TAX, INVESTMENT OR PROFESSIONAL ADVICE APPLICABLE TO ANY USER, BROKER OR LENDER’S SPECIFIC CIRCUMSTANCES. LEVITAS ENTITIES MAKE NO REPRESENTATION OR WARRANTY AS TO THE SUCCESS OF ANY SECURITIES OFFERED BY LEVITAS.THE CONTENTS MAY NOT BE RELIED UPON FOR INVESTMENT PURPOSES.</strong></p>
              <p><strong>WE RECOMMEND THAT YOU CONSULT YOUR OWN PROFESSIONAL ADVISORS REGARDING USE OF THE SITE FOR ANY PURPOSE.</strong></p>
              <p><strong>Trademarks and copyrights</strong></p>
              <p>All logos, trademarks, service marks and trade names used or displayed on the Site are the registered or unregistered trademarks of Levitas Entities or their respective owners. Nothing on the Site grants or may be construed as granting, by implication or otherwise, any license or right to use any logos, trademarks, service marks and trade names displayed on the Site without the written permission of Levitas Entities or such other owner.</p>
              <p>In addition, the Contents may not be copied, reproduced, republished, downloaded, posted, transmitted, distributed or modified, in part or in whole, in any form whatsoever, whether in text, audio, video or executable format, without prior written consent of LEVITAS. Nothing in the Site may be construed as conferring any right to use the Contents in any manner that is protected under the Copyright Act (Canada).</p>
              <p><strong>Internet Browser</strong></p>
              <p>The Site was developed for optimal display on the following browsers: Google Chrome Version 51+ and Safari Version 8+. You are advised to use these internet browsers to enjoy optimal use of the Site. Levitas Entities shall not be held liable for any damages relating to the use of the Site and problems with the display caused by your internet browser. You agree to access the Site using hardware that does not contain viruses and with an up-to-date browser.</p>
              <p><strong>Hypertext Links</strong></p>
              <p>The Site may contain hyperlinks to other websites that are not owned, operated or controlled by Levitas Entities, such as hyperlinks to Brokers’ websites. The hyperlinks are provided solely for convenience. To use the hyperlinks, you must leave the Site. Levitas Entities will not and cannot verify the content, material or any other information on the other websites visited by you. Levitas Entities do not endorse, guarantee, or make any representations or warranties regarding any other websites or any of the content, material or information that may or may not be on such websites. If you decide to access any other website from a hyperlink on the Site, you do so at your own risk. Levitas Entities assume no responsibility and shall not be liable for any damages arising from the use of such other websites.</p>
              <p><strong>Cookies</strong></p>
              <p>Navigation on the Site is likely to cause the installation of cookies on your computer or device. A cookie is a small file which does not identify a user, but which records the information about the navigation of a computer or device on a website. The data obtained is used to facilitate subsequent browsing on the Site and allows tracking of certain statistical data which helps Levitas Entities improve the Site. Refusing the installation of a cookie may prevent you from accessing certain services or parts of the Site. You may configure your computer or device to accept or deny the installation of cookies.</p>
