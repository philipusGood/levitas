              <p><strong>How to become a Lender</strong></p>
              <p>The following describes how to apply to open an account as a lender (a <strong>”Lender”</strong>) with Levitas Marketplace Inc. how to use the lending section of the Site to lend money secured by mortgages and/or hypothecs (<strong>“Mortgages”</strong>).</p>
              <p><strong>IF YOU DO NOT AGREE TO THE TERMS, YOU SHOULD NOT REGISTER TO BECOME A LENDER.</strong></p>
              <p><strong>Credentials</strong></p>
              <p>As a User of the Site you have been provided Credentials. Your Credentials will remain the same after you become a Lender.</p>
              <p><strong>Eligibility to become a Lender</strong></p>
              <p>To become and remain a Lender, you must meet the following criteria:</p>
              <ol class="list-decimal">
                <li><strong>For natural persons:</strong></li>
                <li>reside in Canada;</li>
                <li>be of the legal age of majority in your province or territory of residence;</li>
                <li>have the legal capacity to contract; and</li>
                <li>have a valid deposit account with a regulated Canadian financial institution.</li>
                <li><strong>For other entities:</strong></li>
                <li>be a corporation, a partnership, a public body, a charity, a trust or a co-operative;</li>
                <li>have existed for at least one year;</li>
                <li>have a valid deposit account with a regulated Canadian financial institution; and</li>
                <li>at least 50% of the directors of the corporation or partners of the partnership must be Canadian residents.</li>
              </ol>
              <p><strong>Information and Documents</strong></p>
              <p>To confirm that you are eligible to be a Lender and to verify your identity, LEVITAS requires that you provide certain information and documents. To become a Lender, you must provide all the information and documents noted as required in the Lender registration form found on the Site and any other additional information and/or documents that LEVITAS may require.</p>
              <p>You hereby represent and warrant to LEVITAS that the information and documents you have provided and/or will provide to LEVITAS, and any and all additional information and/or documents that will be submitted to or received by LEVITAS at any time are true, complete and accurate in all respects, as of the date submitted or received. In the event of a change in any information or document provided to LEVITAS, you agree to immediately notify LEVITAS of such change and provide LEVITAS with the correct information or document, as applicable.</p>
              <p>You represent and warrant that you have disclosed to LEVITAS all circumstances that you are aware of which could or might result in a material adverse change in your financial condition, including without limitation any claims, undisclosed liabilities, litigation, arbitration, court proceedings or investigations, including any investigation by any governmental entity, agency or other similar entity, which are current, threatened, pending or otherwise reasonably likely to occur by any third party.</p>
              <p>You hereby acknowledge that LEVITAS may and will use the information provided by you in accordance with the Privacy Policy.</p>
              <p><strong>Acceptance as a Lender</strong></p>
              <p>The decision to accept you as a Lender is made within 5-business days of receipt of all requested documentation and information. However, various factors may result in a delay in the decision, including, but are not limited to, delays in receipt of identity verification. In the event LEVITAS decides not to accept you as a Lender LEVITAS will notify you and may inform you of the reason. If LEVITAS’s decision not to accept you as a Lender is based on erroneous information, you may contact LEVITAS by by e-mail at <a href="mailto:lenders@lendingloop.ca">[compliance@levitas.ai]</a> and submit the correct information and/or documents, as applicable. </p>
              <p>Please note that LEVITAS has complete discretion as to whether to accept as any person or entity as a Lender.</p>
              <p><strong>Lending Process</strong></p>
              <p><strong>General Lending Process</strong></p>
              <p>LEVITAS will inform you by email that have been you are accepted as a Lender and you will have full access to the lending section of the Site when logging into your account.</p>
              <p>On the lending section of the Site, you will have the opportunity to commit to invest into Mortgages. Each Mortgage is issued in connection with a corresponding Loan Request.  </p>
              <p>You will be able to browse through Mortgage Request Pages and view all of the information displayed on such pages, including, but not limited to, financial and security information regarding the Loan Requests.</p>
              <p>Lender Commitments may be accepted by LEVITAS in connection with a Loan Request until the earlier of (a) the time the Loan Request becomes fully funded, and (b) the 30th day from the day the Loan Request was first posted on the Site (the <strong>“Loan Request Expiry Date”</strong>). LEVITAS may with the approval of the Broker, reduce the amount of the Loan Request and/or extend, at its sole discretion, the Loan Request Expiry Date by up to 15 days. LEVITAS will notify you by email of the details of any extension of a Loan Request Expiry Date that exceeds 15 days in connection with a Loan Request to which you have submitted a Mortgage commitment for which you will then be provided with an option to revoke your commitment. After you have acknowledged reviewing the Disclosure Document with regard to a specific Mortgage, you may, by clicking the “Fund Deal” button commit to investment in a Mortgage in an amount you have selected and agree to be bound by all the terms and conditions set forth under the lender commitment (the “<strong>Lender Commitment</strong>”), which you will be required to enter into prior to being granted a right to invest into a Mortgage. If your commitment to invest is accepted, the amount you committed will be added to the aggregate amount of the funds committed to the Loan Request, as indicated on the Mortgage Request Page.</p>
              <p>You understand that clicking on the “Fund Deal” button does not automatically confirm acceptance of your commitment to fund a Loan Request, nor does it grant you any right of priority over the commitment of any other Lender. It is only once your commitment to fund a Loan Request is received and accepted that your commitment will be deemed committed to the specific Loan Request. Accordingly, you understand that other Lenders could commit to invest into a Loan Request simultaneously with you and that this could result in either (i) the amount you wished to commit being greater than the amount of the Loan Request available to be funded, or (ii) the Loan Request becoming fully funded, in which case your commitment would may rejected. You understand that in such circumstances, you will have no recourse against Levitas Entities, the Broker or any other person with respect to the rejection of your commitment to invest.  </p>
              <p><strong>Subject to applicable securities laws, all Lender Commitments are final. Once your Lender Commitment is submitted you may not revoke your commitment except only as may be provided for under applicable laws. You will be able to view the amount committed to each Loan Request in your Levitas Lending Platform account under the “Commitments” category.</strong></p>
              <p><strong>In the event a prospective Broker or Borrower fails to comply with closing requirements applicable to the Loan Request, your commitment will be cancelled. </strong></p>
              <p><strong>Once a Lender Commitment is accepted, the Lender will be required to coordinate directly with the Broker and Borrower for the preparation of appropriate security documents to fund and process Mortgage. Communications between the Lender, Borrower and Broker may take place using the Levitas Lending Platform but LEVITAS is in no way responsible for any documents or communications that are exchanged between the parties.   </strong></p>
              <p><strong>No Secondary Market</strong></p>
              <p><strong>You understand that no secondary market for Mortgages currently exists. Consequently, the Mortgages are illiquid and you should be prepared to hold them for their term which ranges from 1 month to 1 year. Your rights and obligations under a Mortgage may not be assigned or transferred to any other party, except as may be permitted by applicable law. </strong></p>
